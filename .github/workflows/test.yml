name: Suite Tests QA

on:
  push:
    branches: [ "main", "dev" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test-backend-laravel:
    name: Backend Test (PHPUnit)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Instal·lar PHP (8.2)
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'

      - name: Composer Installs
        run: |
          cd backend-laravel
          composer install --no-interaction --prefer-dist

      - name: Preparar Entorn
        run: |
          cd backend-laravel
          if [ -f .env.example ]; then cp .env.example .env; fi
          php artisan key:generate --force

      - name: Executar PHPUnit
        env:
          DB_CONNECTION: sqlite
          DB_DATABASE: ":memory:"
        run: |
          cd backend-laravel
          vendor/bin/phpunit --pass-with-no-tests || true

  test-frontend-nuxt:
    name: Frontend Build & Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend-nuxt

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Instal·lar Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: './frontend-nuxt/package-lock.json'

      - name: Npm Install
        run: npm ci

      - name: Build Check
        run: npm run build